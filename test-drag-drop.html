<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Drag and Drop Test</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      background: #1a1a1a;
      color: #fff;
    }
    .drop-zone {
      border: 3px dashed #666;
      padding: 50px;
      text-align: center;
      margin: 20px 0;
      border-radius: 10px;
      transition: all 0.3s;
    }
    .drop-zone.drag-over {
      border-color: #c9a961;
      background: rgba(201, 169, 97, 0.1);
    }
    .results {
      margin-top: 20px;
      padding: 20px;
      background: #2a2a2a;
      border-radius: 5px;
    }
    .file-item {
      padding: 10px;
      margin: 5px 0;
      background: #333;
      border-radius: 3px;
    }
    .success { border-left: 3px solid #7ee787; }
    .error { border-left: 3px solid #ff7b72; }
  </style>
</head>
<body>
  <h1>Asset Upload - Drag and Drop Test</h1>
  <div id="drop-zone" class="drop-zone">
    <h2>Drop files here</h2>
    <p>Supported: Images (jpg, png, gif, svg, webp), Fonts (woff, woff2, ttf), Media (mp4, mp3)</p>
    <p>Max file size: 10MB</p>
  </div>
  <div id="results" class="results" style="display: none;">
    <h3>Results:</h3>
    <div id="file-list"></div>
  </div>

  <script>
    const dropZone = document.getElementById('drop-zone');
    const results = document.getElementById('results');
    const fileList = document.getElementById('file-list');
    let dragCounter = 0;

    // Prevent default drag behaviors
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
      document.body.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) {
      e.preventDefault();
      e.stopPropagation();
    }

    // Handle drag enter
    dropZone.addEventListener('dragenter', (e) => {
      e.preventDefault();
      dragCounter++;
      if (dragCounter === 1) {
        dropZone.classList.add('drag-over');
      }
    });

    // Handle drag over
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'copy';
    });

    // Handle drag leave
    dropZone.addEventListener('dragleave', (e) => {
      e.preventDefault();
      dragCounter--;
      if (dragCounter <= 0) {
        dropZone.classList.remove('drag-over');
        dragCounter = 0;
      }
    });

    // Handle drop
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dragCounter = 0;
      dropZone.classList.remove('drag-over');

      const files = e.dataTransfer.files;
      handleFiles(files);
    });

    function validateFile(file) {
      const maxSize = 10 * 1024 * 1024; // 10MB
      const allowedTypes = {
        image: ['image/jpeg', 'image/png', 'image/gif', 'image/svg+xml', 'image/webp'],
        font: ['font/woff', 'font/woff2', 'font/ttf', 'application/x-font-ttf', 'application/x-font-woff'],
        media: ['video/mp4', 'audio/mpeg', 'audio/mp3', 'audio/wav', 'audio/ogg']
      };

      // Check file size
      if (file.size > maxSize) {
        return { valid: false, error: `File exceeds 10MB limit` };
      }

      // Check file type
      const isImage = allowedTypes.image.includes(file.type);
      const isFont = allowedTypes.font.includes(file.type);
      const isMedia = allowedTypes.media.includes(file.type);

      // Also check by extension for fonts
      const extension = file.name.split('.').pop().toLowerCase();
      const fontExtensions = ['woff', 'woff2', 'ttf'];
      if (fontExtensions.includes(extension) && !isFont) {
        return { valid: true, type: 'font', folder: 'assets/fonts/' };
      }

      if (!isImage && !isFont && !isMedia) {
        return { valid: false, error: `Unsupported file type (${file.type || 'unknown'})` };
      }

      let folder = 'assets/';
      if (isImage || isMedia) folder = 'assets/media/';
      else if (isFont) folder = 'assets/fonts/';

      return { valid: true, type: isImage ? 'image' : isFont ? 'font' : 'media', folder };
    }

    async function handleFiles(files) {
      results.style.display = 'block';
      fileList.innerHTML = '';

      for (const file of files) {
        const validation = validateFile(file);
        const item = document.createElement('div');
        item.className = `file-item ${validation.valid ? 'success' : 'error'}`;
        
        if (validation.valid) {
          item.innerHTML = `
            <strong>${file.name}</strong><br>
            Size: ${(file.size / 1024).toFixed(2)} KB<br>
            Type: ${file.type || 'unknown'}<br>
            Destination: ${validation.folder}
          `;
          
          // Try to generate thumbnail for images
          if (validation.type === 'image' && file.type.startsWith('image/')) {
            try {
              const thumbnail = await generateThumbnail(file);
              const img = document.createElement('img');
              img.src = thumbnail;
              img.style.width = '32px';
              img.style.height = '32px';
              img.style.marginTop = '5px';
              img.style.borderRadius = '3px';
              item.appendChild(document.createElement('br'));
              item.appendChild(document.createTextNode('Thumbnail: '));
              item.appendChild(img);
            } catch (err) {
              console.warn('Thumbnail generation failed:', err);
            }
          }
        } else {
          item.innerHTML = `
            <strong>${file.name}</strong><br>
            <span style="color: #ff7b72;">Error: ${validation.error}</span>
          `;
        }
        
        fileList.appendChild(item);
      }
    }

    function generateThumbnail(file) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          canvas.width = 32;
          canvas.height = 32;
          const ctx = canvas.getContext('2d');
          
          // Aspect ratio crop
          const scale = Math.max(32 / img.width, 32 / img.height);
          const x = (32 - img.width * scale) / 2;
          const y = (32 - img.height * scale) / 2;
          
          ctx.drawImage(img, x, y, img.width * scale, img.height * scale);
          resolve(canvas.toDataURL('image/png'));
        };
        img.onerror = reject;
        img.src = URL.createObjectURL(file);
      });
    }
  </script>
</body>
</html>
