<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BRT CODE - Creative Code Platform</title>
  <meta name="description" content="A distraction-free creative coding IDE">
  
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#0d1117">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <div id="app" class="app">
    <!-- 1. Icon Sidebar (Leftmost, 48px) -->
    <nav id="icon-sidebar" class="icon-sidebar" aria-label="Navigation">
      <div class="icon-sidebar-top">
        <button class="icon-btn active" data-action="files" title="Files">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
          </svg>
        </button>
        <button class="icon-btn" data-action="search" title="Search">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>
        <button class="icon-btn" data-action="git" title="Git">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="6" y1="12" x2="18" y2="12"></line>
          </svg>
        </button>
        <button class="icon-btn" data-action="extensions" title="Extensions">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
            <polyline points="2 17 12 22 22 17"></polyline>
            <polyline points="2 12 12 17 22 12"></polyline>
          </svg>
        </button>
      </div>
      <div class="icon-sidebar-bottom">
        <button class="icon-btn" data-action="settings" title="Settings">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
        <button class="icon-btn" data-action="user" title="Account">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </button>
      </div>
    </nav>

    <!-- 2. File Sidebar (File Tree Panel, 240px) -->
    <aside id="file-sidebar" class="file-sidebar" aria-label="File Explorer">
      <header class="file-sidebar-header">
        <span class="title" data-action="toggle-file-tree">FILE TREE</span>
        <button class="header-btn" title="More Actions">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="1"></circle>
            <circle cx="12" cy="5" r="1"></circle>
            <circle cx="12" cy="19" r="1"></circle>
          </svg>
        </button>
      </header>
      <div id="file-tree-wrapper" class="file-tree-wrapper">
        <ul id="file-tree" class="file-tree" role="tree"></ul>
      </div>
    </aside>

    <!-- 3. Main Workspace (Editor + Preview) -->
    <main id="workspace" class="workspace">
      <!-- Editor Section -->
      <section id="editor" class="editor" aria-label="Code Editor">
        <header class="editor-header">
          <div class="tabs" role="tablist">
            <button class="tab active" data-tab="index.html" role="tab">
              <span class="file-icon icon-js" title="JavaScript">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polygon points="16 18 22 12 16 6 14 8 10 4 10 10 14 12 16 18"></polygon>
                  <line x1="2" y1="12" x2="14" y2="12"></line>
                  <path d="M6 12v6a4 4 0 0 0 4 4h4"></path>
                </svg>
              </span>
              <span class="tab-name">index.html</span>
              <button class="tab-close" title="Close Tab" data-tab="index.html">×</button>
            </button>
            <button class="tab" data-tab="style.css" role="tab">
              <span class="file-icon icon-css" title="CSS">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M4 10a2 2 0 0 0-2 2v4a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-4a2 2 0 0 0-2-2H4z"></path>
                  <path d="M12 10v4"></path>
                  <path d="M8 10v4"></path>
                  <path d="M16 10v4"></path>
                </svg>
              </span>
              <span class="tab-name">style.css</span>
              <button class="tab-close" title="Close Tab" data-tab="style.css">×</button>
            </button>
            <button class="tab" data-tab="script.js" role="tab">
              <span class="file-icon icon-js" title="JavaScript">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <polygon points="16 18 22 12 16 6 14 8 10 4 10 10 14 12 16 18"></polygon>
                  <line x1="2" y1="12" x2="14" y2="12"></line>
                  <path d="M6 12v6a4 4 0 0 0 4 4h4"></path>
                </svg>
              </span>
              <span class="tab-name">script.js</span>
              <button class="tab-close" title="Close Tab" data-tab="script.js">×</button>
            </button>
          </div>
          <div class="editor-toolbar">
            <button class="toolbar-btn" title="Format">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 20v-6M6 20V10M18 20V4"></path>
              </svg>
            </button>
            <button class="toolbar-btn" title="Split">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="2" width="9" height="20" rx="2"></rect>
                <rect x="13" y="2" width="9" height="20" rx="2"></rect>
              </svg>
            </button>
            <button class="toolbar-btn" title="More">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="3" x2="12" y2="21"></line>
                <line x1="3" y1="12" x2="21" y2="12"></line>
              </svg>
            </button>
          </div>
        </header>
        <div id="editor-container" class="editor-container"></div>
      </section>

      <!-- Preview Section -->
      <section id="preview" class="preview" aria-label="Preview">
        <header class="preview-header">
          <div class="preview-title">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            <span>PREVIEW</span>
          </div>
          <div class="preview-toolbar">
            <button class="toolbar-btn" title="Refresh">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 4v6h-6"></path>
                <path d="M1 20v-6h6"></path>
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
              </svg>
            </button>
            <button class="toolbar-btn" title="Run (Ctrl+Enter)">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="none">
                <polygon points="5 3 19 12 5 21 5 3"></polygon>
              </svg>
            </button>
            <button class="toolbar-btn" title="Popout">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                <polyline points="15 3 21 3 21 9"></polyline>
                <line x1="10" y1="14" x2="21" y2="3"></line>
              </svg>
            </button>
            <button class="toolbar-btn" title="Fullscreen">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
              </svg>
            </button>
            <button class="toolbar-btn" title="Toggle Preview">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12h6"></path>
                <path d="M20 12h6"></path>
                <path d="M14 2v20"></path>
              </svg>
            </button>
          </div>
        </header>
        <div id="preview-placeholder" class="preview-placeholder hidden">
          <span class="placeholder-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#c9a961" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 3a2 2 0 0 1-2 2c-1.5 0-2.9-.6-3.8-1.6C17 1.2 15.6.5 14 .5h-.5C11.6.5 9.5 1.8 8 4.2c-.4.6-1.4 2.3-2.8 4.8-1.4 2.6-2.4 4.6-2.4 4.6s1.9 2.8 5.1 2.8c3.2 0 5.1-2.8 5.1-2.8s-1-2 2.4-4.6c1.4-2.5 2.4-4.2 2.8-4.8C14.8 2.6 16.2 2 17.8 2 18.5 2 19.5 2.8 20 3.8c.5 1 .7 1.5.7 1.5zM12 21a6 6 0 1 0 0-12 6 6 0 0 0 0 12z"></path>
            </svg>
          </span>
          <p class="placeholder-text">Ready to code</p>
          <p class="placeholder-subtext">Click "Run" or start coding to see your creation</p>
        </div>
        <div class="preview-content">
          <iframe id="preview-frame" class="preview-frame" title="Code Preview" sandbox="allow-scripts allow-same-origin"></iframe>
        </div>
      </section>
    </main>

    <!-- 4. Bottom Console Panel -->
    <section id="console-panel" class="console-panel" aria-label="Console">
      <header class="console-header">
        <div class="console-tabs">
          <button class="console-tab active" data-console="console">CONSOLE</button>
          <button class="console-tab" data-console="terminal">TERMINAL</button>
          <button class="console-tab" data-console="output">OUTPUT</button>
        </div>
        <div class="console-actions">
          <button class="action-btn" title="Clear">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
          </button>
          <button class="action-btn" title="Filter">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
            </svg>
          </button>
          <button class="action-btn" title="Minimize">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
          </button>
          <button class="action-btn" title="Close">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
      </header>
      <div id="console-content" class="console-content"></div>
      <div class="console-input">
        <span class="prompt"> ></span>
        <input type="text" id="console-input" placeholder="Type a command..." autocomplete="off" />
      </div>
    </section>

    <!-- Command Palette -->
    <div id="command-palette" class="command-palette hidden" role="dialog" aria-modal="true" aria-label="Command Palette">
      <div class="palette-input-wrapper">
        <span class="icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </span>
        <input type="text" id="palette-input" class="palette-input" placeholder="Search commands or files..." autocomplete="off">
      </div>
      <ul id="palette-results" class="palette-results list" role="listbox"></ul>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal hidden" role="dialog" aria-modal="true" aria-label="Settings">
      <div class="modal-content settings-modal">
        <div class="modal-header">
          <h2 class="modal-title">Settings</h2>
          <button class="modal-close" data-action="close-modal">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <form id="settings-form" class="settings-form">
            <div class="form-group">
              <label class="form-label" for="auto-run">Auto-run on change</label>
              <div class="form-control">
                <input type="checkbox" id="auto-run" class="form-checkbox">
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="debounce-time">Debounce time (ms)</label>
              <input type="number" id="debounce-time" class="form-input" min="100" max="2000" step="100" value="500">
            </div>

            <div class="form-group">
              <label class="form-label" for="console-mode">Console mode</label>
              <select id="console-mode" class="form-select">
                <option value="full">Full (logs, warnings, errors)</option>
                <option value="minimal">Minimal (errors only)</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label" for="theme">Theme</label>
              <select id="theme" class="form-select">
                <option value="brtcode">BRT CODE (Gold/Dark)</option>
                <option value="dark">Dark</option>
                <option value="light">Light</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label" for="font-size">Editor font size</label>
              <select id="font-size" class="form-select">
                <option value="11">11px</option>
                <option value="12">12px</option>
                <option value="13">13px</option>
                <option value="14" selected>14px</option>
                <option value="16">16px</option>
                <option value="18">18px</option>
              </select>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button class="btn" data-action="close-modal">Cancel</button>
          <button class="btn primary" data-action="save-settings">Save Settings</button>
        </div>
      </div>
    </div>

    <!-- Project Info Modal -->
    <div id="project-info-modal" class="modal hidden" role="dialog" aria-modal="true" aria-label="Project Info">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title">Project Info</h2>
          <button class="modal-close" data-action="close-modal">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="project-info">
            <div class="info-item">
              <label class="info-label">Name:</label>
              <span class="info-value" id="project-name">Untitled Project</span>
            </div>
            <div class="info-item">
              <label class="info-label">Location:</label>
              <span class="info-value" id="project-location">--</span>
            </div>
            <div class="info-item">
              <label class="info-label">Files:</label>
              <span class="info-value" id="project-files">3</span>
            </div>
            <div class="info-item">
              <label class="info-label">Created:</label>
              <span class="info-value" id="project-created">--</span>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn primary" data-action="close-modal">OK</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="../src/main.js"></script>
</body>
</html>
